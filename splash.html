<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Arvi AI Tech — Splash</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
<style>
  :root{
    --cyan:#38f3ff; --violet:#8b5cff; --pink:#ff4db8;
    --grad:linear-gradient(120deg,#38f3ff,#8b5cff 52%,#ff4db8);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Sora",system-ui,sans-serif;background:#04050a;color:#eaf0ff;
    overflow:hidden;-webkit-font-smoothing:antialiased;
  }

  /* ====== APP (revealed after splash) ====== */
  .app{
    position:fixed;inset:0;display:grid;place-content:center;justify-items:center;gap:14px;text-align:center;padding:30px;
    background:radial-gradient(120% 90% at 50% 0%,#160f33,#04050a 70%);
  }
  .app h1{font-size:30px}
  .app p{color:#8b93ad;font-family:"JetBrains Mono",monospace;font-size:13px;letter-spacing:1px}
  .app .play{margin-top:18px;border:0;cursor:pointer;font-family:"Sora";font-weight:700;font-size:15px;color:#04050a;background:var(--grad);padding:14px 30px;border-radius:14px;box-shadow:0 10px 30px rgba(56,243,255,.35)}

  /* ====== SPLASH ====== */
  .splash{
    position:fixed;inset:0;z-index:10;background:#04050a;
    display:grid;place-content:center;justify-items:center;
    transition:opacity .6s ease, transform .8s cubic-bezier(.6,0,.2,1), filter .8s;
  }
  .splash.warp{opacity:0;transform:scale(1.6);filter:blur(8px);pointer-events:none}

  #fx{position:absolute;inset:0;width:100%;height:100%}

  .stage{position:relative;display:grid;justify-items:center;gap:30px;z-index:2}

  /* logo */
  .logo{position:relative;width:128px;height:128px;display:grid;place-items:center;opacity:0;transform:scale(.4);animation:logoIn .9s .25s cubic-bezier(.2,1.3,.4,1) forwards}
  @keyframes logoIn{to{opacity:1;transform:scale(1)}}
  .badge{
    width:104px;height:104px;border-radius:28px;display:grid;place-items:center;
    background:var(--grad);color:#04050a;font-family:"Sora";font-weight:800;font-size:58px;
    box-shadow:0 0 0 rgba(56,243,255,.6);animation:glow 2s .9s ease-in-out infinite;
  }
  @keyframes glow{0%,100%{box-shadow:0 0 30px rgba(56,243,255,.45),0 0 70px rgba(139,92,255,.3)}50%{box-shadow:0 0 55px rgba(56,243,255,.8),0 0 110px rgba(255,77,184,.45)}}
  .badge::after{content:"";position:absolute;inset:-3px;border-radius:31px;background:var(--grad);filter:blur(14px);opacity:.5;z-index:-1}
  /* orbit rings */
  .ring{position:absolute;border-radius:50%;border:1px solid rgba(255,255,255,.10);opacity:0;animation:ringIn .8s .5s forwards}
  .ring.r1{width:150px;height:150px}
  .ring.r2{width:188px;height:188px;border-style:dashed;border-color:rgba(56,243,255,.25);animation:ringIn .8s .65s forwards, spin 14s linear infinite}
  .ring.r3{width:230px;height:230px;border-color:rgba(139,92,255,.18);animation:ringIn .8s .8s forwards, spin 22s linear infinite reverse}
  @keyframes ringIn{to{opacity:1}}
  @keyframes spin{to{transform:rotate(360deg)}}
  /* orbiting dot */
  .orbit{position:absolute;width:188px;height:188px;animation:spin 6s linear infinite;opacity:0;animation:ringIn .8s .9s forwards, spin 6s linear infinite}
  .orbit::before{content:"";position:absolute;top:-4px;left:50%;width:8px;height:8px;margin-left:-4px;border-radius:50%;background:var(--cyan);box-shadow:0 0 14px var(--cyan)}

  /* brand text */
  .brand{display:flex;gap:2px;font-weight:800;font-size:30px;letter-spacing:4px}
  .brand .ch{opacity:0;transform:translateY(18px);display:inline-block;
    background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    animation:chIn .5s forwards}
  .brand .sp{width:14px}
  @keyframes chIn{to{opacity:1;transform:none}}
  .tagline{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:5px;color:#8b93ad;
    opacity:0;animation:fadeUp .6s 1.7s forwards}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  /* progress */
  .load{position:absolute;bottom:8%;left:50%;transform:translateX(-50%);width:200px;display:grid;gap:10px;justify-items:center;
    opacity:0;animation:fadeUp .6s 1.9s forwards;z-index:2}
  .bar{width:200px;height:3px;border-radius:3px;background:rgba(255,255,255,.08);overflow:hidden}
  .bar i{display:block;height:100%;width:0;background:var(--grad);box-shadow:0 0 12px rgba(56,243,255,.6);border-radius:3px}
  .pct{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:2px;color:#8b93ad}

  /* replay */
  .replay{position:fixed;right:14px;bottom:14px;z-index:30;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
    color:#8b93ad;font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:1px;padding:8px 12px;border-radius:10px;cursor:pointer}
  .flash{position:fixed;inset:0;z-index:20;background:#fff;opacity:0;pointer-events:none}
  .flash.go{animation:flash .5s ease forwards}
  @keyframes flash{0%{opacity:0}30%{opacity:.85}100%{opacity:0}}
</style>

<!-- Google AdSense (Lazy Loaded for Performance) -->
<script type="text/javascript">
  let adLoaded = false;
  function loadAds() {
    if(!adLoaded) {
      adLoaded = true;
      let s = document.createElement('script');
      s.src = "https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8633808258036617";
      s.crossOrigin = "anonymous";
      document.head.appendChild(s);
      window.removeEventListener('scroll', loadAds);
      window.removeEventListener('mousemove', loadAds);
      window.removeEventListener('touchstart', loadAds);
    }
  }
  window.addEventListener('scroll', loadAds);
  window.addEventListener('mousemove', loadAds);
  window.addEventListener('touchstart', loadAds);
  setTimeout(loadAds, 5000);
</script>

  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
</head>
<body>

  <!-- The actual app/game loads here (placeholder) -->
  <main class="app">
    <h1>Your game is ready 🎮</h1>
    <p>THIS IS WHERE YOUR APP / GAME LOADS</p>
    <button class="play" onclick="runSplash()">▶ Replay intro</button>
  </main>

  <!-- Brand splash overlay -->
  <div class="splash" id="splash">
    <canvas id="fx"></canvas>
    <div class="stage">
      <div class="logo">
        <span class="ring r1"></span><span class="ring r2"></span><span class="ring r3"></span>
        <span class="orbit"></span>
        <span class="badge">A</span>
      </div>
      <div class="brand" id="brand"></div>
      <div class="tagline">INTELLIGENT&nbsp;GAMES&nbsp;·&nbsp;AI&nbsp;SYSTEMS</div>
    </div>
    <div class="load">
      <div class="bar"><i id="barFill"></i></div>
      <div class="pct" id="pct">LOADING 0%</div>
    </div>
  </div>
  <div class="flash" id="flash"></div>
  <button class="replay" onclick="runSplash()">⟲ replay</button>

<script>
/* ---- build brand letters with stagger ---- */
function buildBrand(){
  const host=document.getElementById('brand');
  host.innerHTML='';
  const text="ARVI AI TECH";
  let delay=1.0;
  [...text].forEach(c=>{
    if(c===' '){const s=document.createElement('span');s.className='sp';host.appendChild(s);return;}
    const el=document.createElement('span');
    el.className='ch';el.textContent=c;
    el.style.animationDelay=delay.toFixed(2)+'s';
    delay+=0.06;
    host.appendChild(el);
  });
}

/* ---- particle convergence canvas ---- */
let raf;
let warpSpeed = false;
function particles(){
  const cv=document.getElementById('fx');const ctx=cv.getContext('2d');
  const dpr=Math.min(devicePixelRatio||1,2);
  function size(){cv.width=innerWidth*dpr;cv.height=innerHeight*dpr;}
  size();
  const cx=cv.width/2, cy=cv.height/2 - 30*dpr;
  const N=150;
  const ps=Array.from({length:N},()=>{
    const a=Math.random()*Math.PI*2, r=(Math.max(cv.width,cv.height))*0.8;
    return {x:cx+Math.cos(a)*r, y:cy+Math.sin(a)*r, tx:cx, ty:cy,
            sz:(Math.random()*2.5+0.8)*dpr, sp:Math.random()*0.03+0.015,
            angle:a, dist:r,
            col:Math.random()<.5?'56,243,255':'139,92,255'};
  });
  const start=performance.now();
  warpSpeed = false;
  function draw(now){
    const t=now-start;
    if(warpSpeed) {
      ctx.fillStyle = 'rgba(4,5,10,0.3)';
      ctx.fillRect(0,0,cv.width,cv.height);
    } else {
      ctx.clearRect(0,0,cv.width,cv.height);
    }
    ps.forEach(p=>{
      if(!warpSpeed) {
        p.x+=(p.tx-p.x)*p.sp; p.y+=(p.ty-p.y)*p.sp;
      } else {
        p.sp *= 1.15;
        p.x += Math.cos(p.angle) * p.sp * 15;
        p.y += Math.sin(p.angle) * p.sp * 15;
        p.sz = Math.min(p.sz * 1.05, 12 * dpr);
      }
      const d=Math.hypot(p.tx-p.x,p.ty-p.y);
      const fade=warpSpeed ? 1 : Math.min(1, d/120/dpr);
      
      ctx.beginPath();
      if(warpSpeed) {
         ctx.moveTo(p.x - Math.cos(p.angle)*p.sp*20, p.y - Math.sin(p.angle)*p.sp*20);
         ctx.lineTo(p.x, p.y);
         ctx.lineWidth = p.sz;
         ctx.strokeStyle='rgba('+p.col+','+(0.3+0.7*fade).toFixed(2)+')';
         ctx.stroke();
      } else {
         ctx.arc(p.x,p.y,p.sz,0,7);
         ctx.fillStyle='rgba('+p.col+','+(0.15+0.55*fade).toFixed(2)+')';
         ctx.shadowBlur=8*dpr;ctx.shadowColor='rgba('+p.col+',.8)';
         ctx.fill();ctx.shadowBlur=0;
      }
    });
    if(t<4600) raf=requestAnimationFrame(draw);
    else ctx.clearRect(0,0,cv.width,cv.height);
  }
  cancelAnimationFrame(raf);
  raf=requestAnimationFrame(draw);
  window.onresize=size;
}

/* ---- progress + handoff ---- */
let timers=[];
function clearTimers(){timers.forEach(clearTimeout);timers=[];}
function runSplash(){
  clearTimers();
  const splash=document.getElementById('splash');
  const fill=document.getElementById('barFill');
  const pct=document.getElementById('pct');
  const flash=document.getElementById('flash');
  splash.classList.remove('warp');flash.classList.remove('go');
  fill.style.transition='none';fill.style.width='0';pct.textContent='LOADING 0%';
  buildBrand();
  particles();

  // animate loading bar from ~2.0s to ~3.6s
  timers.push(setTimeout(()=>{
    fill.style.transition='width 1.6s cubic-bezier(.4,0,.2,1)';
    fill.style.width='100%';
    let p=0;const iv=setInterval(()=>{p=Math.min(100,p+Math.ceil(Math.random()*9));pct.textContent='LOADING '+p+'%';if(p>=100){clearInterval(iv);pct.textContent='READY';}},150);
    timers.push(iv);
  },2000));

  // trigger warp
  timers.push(setTimeout(()=>{
    warpSpeed = true;
  },3600));

  // warp out -> reveal app
  timers.push(setTimeout(()=>{
    flash.classList.add('go');
    splash.classList.add('warp');
  },3950));
}

window.addEventListener('load',runSplash);
</script>
</body>
</html>
